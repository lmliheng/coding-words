<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="icon" href="../../../image/logo-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
<div id="page" class="site">
    <div class="container">
        <div class="login">
            <div class="hero">
                
                <h1><br>CodeWord</h1>
                
            </div>
            <div class="main">
                <form id="register-form" method="POST" action="">
                    <p>
                        <input type="text" name="username" placeholder="用户名" id="username">
                        <span class="error-message" id="username-error"></span>
                    </p>
                    <p>
                        <input type="email" name="email" placeholder="邮箱" id="email">
                        <span class="error-message" id="email-error"></span>
                    </p>
                    <p class="password">
                        <input type="password" name="password" placeholder="密码" data-password="password" id="password">
                        <span class="error-message" id="password-error"></span>
                    </p>
                        <p class="password">
                        <input type="password" placeholder="再次输入密码" data-password="password" id="confirm-password">
                        <span class="error-message" id="confirm-password-error"></span>
                    </p>
                    <p>
                        <input type="text" name="verification_code" placeholder="邮箱验证码" id="verification-code"> 
                        <button type="button" id="send-code">发送验证码</button>
                        <span class="error-message" id="verification-code-error"></span>
                    </p>
                    <p>
                        <input type="submit" class="submit" value="注册">
                    </p>
                    <p class="login-link">
                        已有账号？<a href="../login/login.html">立即登录</a>
                    </p>
                </form>
                <div class="message" id="message"></div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qs/dist/qs.js"></script>
<script>
    // 表单验证函数
    function validateForm() {
        let isValid = true;
        
        // 清空所有错误信息
        document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
        
        // 验证用户名
        const username = document.getElementById('username').value.trim();
        if (!username) {
            document.getElementById('username-error').textContent = '请输入用户名';
            isValid = false;
        } else if (username.length < 3 || username.length > 20) {
            document.getElementById('username-error').textContent = '用户名长度应在3-20之间';
            isValid = false;
        }
        
        // 验证邮箱
        const email = document.getElementById('email').value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) {
            document.getElementById('email-error').textContent = '请输入邮箱';
            isValid = false;
        } else if (!emailRegex.test(email)) {
            document.getElementById('email-error').textContent = '请输入有效的邮箱地址';
            isValid = false;
        }
        
        // 验证密码
        const password = document.getElementById('password').value;
        if (!password) {
            document.getElementById('password-error').textContent = '请输入密码';
            isValid = false;
        } else if (password.length < 6) {
            document.getElementById('password-error').textContent = '密码长度至少6位';
            isValid = false;
        }
        
        // 验证确认密码
        const confirmPassword = document.getElementById('confirm-password').value;
        if (!confirmPassword) {
            document.getElementById('confirm-password-error').textContent = '请再次输入密码';
            isValid = false;
        } else if (password !== confirmPassword) {
            document.getElementById('confirm-password-error').textContent = '两次输入的密码不一致';
            isValid = false;
        }
        
        // 验证验证码
        const verificationCode = document.getElementById('verification-code').value.trim();
        if (!verificationCode) {
            document.getElementById('verification-code-error').textContent = '请输入验证码';
            isValid = false;
        }
        
        return isValid;
    }
    




    // 发送验证码
    document.getElementById('send-code').addEventListener('click', async function() {

        const email = document.getElementById('email').value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) {
            document.getElementById('email-error').textContent = '请输入邮箱';
            return;
        }
        
        if (!emailRegex.test(email)) {
            document.getElementById('email-error').textContent = '请输入有效的邮箱地址';
            return;
        }
        
        // 禁用发送按钮
        const sendCodeBtn = document.getElementById('send-code');
        sendCodeBtn.disabled = true;
        sendCodeBtn.textContent = '发送中...';
        
        try {
            const response = await axios.post(
                'http://127.0.0.1:3000/api/auth/send-code',
                Qs.stringify({ email }),
                { headers: { 'Content-Type': 'application/x-www-form-urlencoded' } }
            );
            
            console.log('用户注册账号请求发送验证码');
            
            setTimeout(() => {
                sendCodeBtn.textContent = '60s后重新发送';
                let countdown = 60;
                const timer = setInterval(() => {
                    countdown--;
                    sendCodeBtn.textContent = `${countdown}s后重新发送`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        sendCodeBtn.disabled = false;
                        sendCodeBtn.textContent = '发送验证码';
                    }
                }, 1000);
                
                // 显示成功消息
                showMessage('验证码已发送到您的邮箱', 'success');

            }, 1000);

        } catch (error) {
            console.error('发送验证码失败:', error);
            sendCodeBtn.disabled = false;
            sendCodeBtn.textContent = '发送验证码';
            
            // 显示具体错误信息
            if (error.response && error.response.data) {
                document.getElementById('email-error').textContent = error.response.data.message || '发送验证码失败';
            } else {
                showMessage('发送验证码失败，请稍后重试', 'error');
            }
        }
    });
    

    
    // 表单提交处理
    document.getElementById('register-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        
        // 验证表单
        if (!validateForm()) {
            return;
        }
        
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const verificationCode = document.getElementById('verification-code').value.trim();
        
        try {
            const response = await axios.post(
                'http://127.0.0.1:3000/api/auth/register',
                Qs.stringify({ username, email, password, verificationCode }),
                { headers: { 'Content-Type': 'application/x-www-form-urlencoded' } }
            );
            
            console.log('注册响应:', response.data);
            
            if (response.status === 201) {
                // 存储JWT令牌到本地存储
                localStorage.setItem('token', response.data.token);
                showMessage('注册成功，正在跳转...', 'success');
                setTimeout(() => {
                    window.location.href = '../../index.html';
                }, 1500);
            } else {
                showMessage('注册失败: ' + response.data.message, 'error');
            }
        } catch (error) {
            console.error('注册失败:', error);
            if (error.response && error.response.data) {
                const errorMessage = error.response.data.message;
                
                // 根据错误信息显示在对应字段
                if (errorMessage.includes('验证码')) {
                    document.getElementById('verification-code-error').textContent = errorMessage;
                } else if (errorMessage.includes('用户名') || errorMessage.includes('已存在')) {
                    document.getElementById('username-error').textContent = errorMessage;
                } else if (errorMessage.includes('邮箱')) {
                    document.getElementById('email-error').textContent = errorMessage;
                } else {
                    showMessage('注册失败: ' + errorMessage, 'error');
                }
            } else {
                showMessage('注册失败，请稍后重试', 'error');
            }
        }
    });
    


    // 显示消息函数
    function showMessage(text, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';
        
        // 3秒后隐藏消息
        setTimeout(() => {
            messageDiv.style.display = 'none';
        }, 3000);
    }

    // 监听ESC键
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            // 返回首页
            window.location.href = '../../index.html';
        }
    });

</script>
</html>
