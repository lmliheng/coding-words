<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传专业名词</title>
    <link rel="icon" href="../../../image/logo-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
          <link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css"/>
        
</head>
<body>
    <div class="container">
        <header class="upload-header">
         
            <a href="../../index.html" class="back-link">返回首页</a>
        </header>
        
        <main class="upload-form">
            <form id="upload-form">
                <div class="form-group">
                    
                    <input type="text" id="word-title" name="title" placeholder="请输入标题" required>
                </div>
                
                
                
                <div class="form-group">
                    <label for="word-content"></label>
                    <div id="content"></div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="submit-btn">上传</button>
                    <button type="reset" class="reset-btn">重置</button>
                </div>
            </form>
        </main>
    </div>
    
 
    <script src="script.js"></script>
    <script>
            // 监听ESC键
                document.addEventListener('keydown', function(event) {
                        if (event.key === 'Escape') {
            // 返回首页
                window.location.href = '../../index.html';
    }
});
    </script>
    <script src="https://unpkg.com/vditor/dist/index.min.js"></script>

</html>
