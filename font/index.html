<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key_Word</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                <div class="headico"> 
                    <a href="https://github.com/lmliheng/coding-words">

                    </a>   
            </div>
                </div>

            </div>

            <div class="rankings-section">

                <div class="ranking-item">
                    <h4>贡献榜</h4>
                    <div class="ranking-content" id="contribution-rank"></div>
                </div>
            </div>

            <div class="words-section">
                <h2>Key_List</h2>
                <div class="words-container" id="words-container">

                    <div class="keyword-content" id="keyword-rank">
<img alt="github-snake"

 style="visibility: visible; max-width: 100%;">

                    </div>       


                </div>
            </div>
        </div>

    <script src="js/data.js"></script>

    <script src="js/main.js"></script>

</html>
