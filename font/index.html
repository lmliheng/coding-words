<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CodeWord</title>
<!-- 禁用缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" href="../image/logo-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style_mobile.css">
    <link rel="stylesheet" href="css/style_pc.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                <div class="headico"> 
                    <a href="https://github.com/lmliheng/coding-words">
                        <img src="../image/github-142-svgrepo-com.svg" alt="GitHub Icon">
                    </a>   
            </div>
                </div>

      

                <div class="login-btn">
                    <a href="./model/login/login.html"><button>登录</button></a>
                </div>


            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="search-section">
                <div class="search-container">
                    <button id="search-btn" ><img src="../image/search.svg" alt="Search Icon" class="search-icon"></button>
                    <input type="text" id="search-input" >
                </div>
            </div>

            <div class="rankings-section">
                <div class="ranking-item">
                    <div class="ranking-item-title">
                        <h4>热搜榜</h4> <a href="#" class="more-link">更多<img src="../image/alt-arrow-right-svgrepo-com.svg" alt="Arrow Right Icon"></a>
                    </div>  
                    <div class="ranking-content" id="hot-search"></div>
                </div>


                <div class="ranking-item">
                    <div class="ranking-item-title">
                        <h4>贡献榜</h4> <a href="#" class="more-link">更多<img src="../image/alt-arrow-right-svgrepo-com.svg" alt="Arrow Right Icon"></a>
                    </div>  
                    <div class="ranking-contributions" id="contribution-rank"></div>
                </div>
              
            </div>


        </div>
    </main>


    
    <script src="js/search.js"></script>
    <script src="js/main.js"></script>
    <script src="js/check-auth.js"></script>

    
</body>
</html>
